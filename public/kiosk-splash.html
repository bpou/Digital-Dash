<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Digital Dash Boot</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07090c;
      }

      .splash {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <img class="splash" src="/Das%20Rolf.png" alt="Das Rolf" />
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "/cluster";
      let navigated = false;

      const navigate = () => {
        if (navigated) return;
        navigated = true;
        window.location.replace(target);
      };

      const probe = async () => {
        try {
          const response = await fetch(target, { cache: "no-store" });
          if (response.ok) {
            window.setTimeout(navigate, 250);
            return;
          }
        } catch {
          // Service not ready yet.
        }
        window.setTimeout(probe, 500);
      };

      probe();
    </script>
  </body>
</html>
