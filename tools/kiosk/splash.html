<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Dash Boot</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .splash {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <img class="splash" src="../../public/Das%20Rolf.png" alt="Das Rolf" />
    <script>
      const clusterUrl = "http://127.0.0.1:5173/cluster";

      const checkCluster = async () => {
        try {
          await fetch(clusterUrl, { cache: "no-store", mode: "no-cors" });
          window.location.replace(clusterUrl);
          return;
        } catch {
          // Ignore until service is ready
        }
        window.setTimeout(checkCluster, 1000);
      };

      checkCluster();
    </script>
  </body>
</html>
