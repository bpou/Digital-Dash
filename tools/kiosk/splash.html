<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Digital Dash Boot</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07090c;
      }

      body {
        position: relative;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <img class="splash" src="../../public/Das%20Rolf.png" alt="Das Rolf" />
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "http://127.0.0.1:5173/cluster";
      let navigated = false;

      const tryNavigate = async () => {
        if (navigated) return;
        try {
          const response = await fetch(target, { cache: "no-store", mode: "same-origin" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          navigated = true;
          window.setTimeout(() => {
            window.location.replace(target);
          }, 250);
          return;
        } catch {
          // Ignore until service is ready.
        }
        window.setTimeout(tryNavigate, 500);
      };

      tryNavigate();
    </script>
  </body>
</html>
