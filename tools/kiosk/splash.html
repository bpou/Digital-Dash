<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Digital Dash Boot</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07090c;
      }

      body {
        position: relative;
      }

      .cluster {
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #07090c;
        opacity: 0;
        transition: opacity 180ms linear;
        pointer-events: none;
      }

      .cluster--visible {
        opacity: 1;
        pointer-events: auto;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        user-select: none;
        -webkit-user-drag: none;
        opacity: 1;
        transition: opacity 180ms linear;
      }

      .splash--hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <img class="splash" src="../../public/Das%20Rolf.png" alt="Das Rolf" />
    <iframe class="cluster" title="Digital Dash Cluster" tabindex="-1"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "http://127.0.0.1:5173/cluster";
      const readySignalUrl = params.get("kiosk_ready");
      const splashEl = document.querySelector(".splash");
      const frameEl = document.querySelector(".cluster");
      const clusterUrl = new URL(target);
      if (readySignalUrl) {
        clusterUrl.searchParams.set("kiosk_ready", readySignalUrl);
      }

      let loadingStarted = false;
      let frameLoaded = false;
      let appReady = false;
      let readySignaled = false;
      let loadFallbackTimer = null;

      const signalReady = () => {
        if (readySignaled || !readySignalUrl) return;
        readySignaled = true;
        try {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(readySignalUrl, "ready");
            return;
          }
        } catch {
          // fall through to fetch
        }
        fetch(readySignalUrl, { method: "POST", mode: "no-cors", keepalive: true }).catch(() => {
          // ignore readiness signal failures
        });
      };

      const maybeReveal = () => {
        if (!frameLoaded || !appReady) return;
        frameEl.classList.add("cluster--visible");
        splashEl.classList.add("splash--hidden");
        signalReady();
      };

      frameEl.addEventListener("load", () => {
        frameLoaded = true;
        if (loadFallbackTimer) {
          window.clearTimeout(loadFallbackTimer);
        }
        loadFallbackTimer = window.setTimeout(() => {
          appReady = true;
          maybeReveal();
        }, 900);
        maybeReveal();
      });

      window.addEventListener("message", (event) => {
        if (event.source !== frameEl.contentWindow) return;
        const payload = event.data;
        const type = typeof payload === "string" ? payload : payload && payload.type;
        if (type === "digital-dash-ready") {
          appReady = true;
          maybeReveal();
        }
      });

      window.setTimeout(() => {
        appReady = true;
        maybeReveal();
      }, 20000);

      const checkCluster = async () => {
        try {
          await fetch(target, { cache: "no-store", mode: "no-cors" });
          if (!loadingStarted) {
            loadingStarted = true;
            frameEl.src = clusterUrl.toString();
          }
          return;
        } catch {
          // Ignore until service is ready.
        }
        window.setTimeout(checkCluster, 500);
      };

      checkCluster();
    </script>
  </body>
</html>
